<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Banker Console</title>
    <!-- Tailwind CSS for clean, rapid layout styles -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React & Babel for reactive state engine -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_PLAYERS = [
            { id: 'p1', name: 'Amit', color: 'bg-rose-600', text: 'text-rose-400', border: 'border-rose-500', balance: 15000 },
            { id: 'p2', name: 'Riya', color: 'bg-sky-600', text: 'text-sky-400', border: 'border-sky-500', balance: 15000 },
            { id: 'p3', name: 'Kaelen', color: 'bg-emerald-600', text: 'text-emerald-400', border: 'border-emerald-500', balance: 15000 },
            { id: 'p4', name: 'Sarah', color: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500', balance: 15000 }
        ];

        function App() {
            const [players, setPlayers] = useState(() => {
                const saved = localStorage.getItem('biz_players');
                return saved ? JSON.parse(saved) : INITIAL_PLAYERS;
            });
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('biz_logs');
                return saved ? JSON.parse(saved) : [];
            });

            const [sender, setSender] = useState(null);
            const [receiver, setReceiver] = useState(null);
            const [amount, setAmount] = useState(0);
            const [reason, setReason] = useState('General');

            useEffect(() => {
                localStorage.setItem('biz_players', JSON.stringify(players));
                localStorage.setItem('biz_logs', JSON.stringify(logs));
            }, [players, logs]);

            const handleExecute = () => {
                if (!sender || !receiver) return alert('Select both Sender and Receiver');
                if (sender === receiver) return alert('Sender and Receiver cannot be the same');
                if (amount <= 0) return alert('Add an amount using the bill denominations');

                const updatedPlayers = players.map(p => {
                    let bal = p.balance;
                    if (p.id === sender) bal -= amount;
                    if (p.id === receiver) bal += amount;
                    return { ...p, balance: bal };
                });

                const logEntry = {
                    id: Date.now().toString(),
                    sender: sender === 'bank' ? { name: 'Bank', color: 'bg-slate-700' } : players.find(p => p.id === sender),
                    receiver: receiver === 'bank' ? { name: 'Bank', color: 'bg-slate-700' } : players.find(p => p.id === receiver),
                    amount,
                    reason,
                    previousState: JSON.parse(JSON.stringify(players))
                };

                setPlayers(updatedPlayers);
                setLogs([logEntry, ...logs]);
                
                // Reset inputs for next turn
                setSender(null);
                setReceiver(null);
                setAmount(0);
                setReason('General');
            };

            const handleUndo = () => {
                if (logs.length === 0) return;
                const lastLog = logs[0];
                setPlayers(lastLog.previousState);
                setLogs(logs.slice(1));
            };

            const handleReset = () => {
                if (window.confirm('Clear all ledger data and restart fresh?')) {
                    setPlayers(INITIAL_PLAYERS);
                    setLogs([]);
                    setSender(null);
                    setReceiver(null);
                    setAmount(0);
                }
            };

            return (
                <div class="max-w-6xl mx-auto p-4 md:p-6 lg:p-8 space-y-6">
                    {/* Header */}
                    <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                        <h1 class="text-2xl font-bold tracking-wider text-slate-200">INTERNATIONAL BUSINESS <span class="text-xs bg-slate-800 text-slate-400 px-2 py-1 rounded ml-2 font-mono">BANKER</span></h1>
                        <button onClick={handleReset} class="text-xs text-slate-500 hover:text-rose-400 font-mono transition">RESET BOARD</button>
                    </div>

                    {/* Balances Layout */}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {players.map(p => (
                            <div key={p.id} class={`p-4 rounded-xl border ${p.border} bg-slate-900/50 backdrop-blur flex flex-col justify-between h-24`}>
                                <div class="flex items-center gap-2">
                                    <span class={`w-3 h-3 rounded-full ${p.color}`}></span>
                                    <span class="font-medium text-slate-300">{p.name}</span>
                                </div>
                                <div class="text-2xl font-mono font-bold text-white">${p.balance.toLocaleString()}</div>
                            </div>
                        ))}
                    </div>

                    {/* Controls Module */}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                        
                        {/* 1. SENDER */}
                        <div class="space-y-3">
                            <label class="text-xs uppercase font-mono tracking-widest text-slate-400 block">1. Who pays? (From)</label>
                            <div class="flex flex-col gap-2">
                                {players.map(p => (
                                    <button key={p.id} onClick={() => setSender(p.id)} class={`w-full p-3 rounded-lg font-medium text-left transition flex items-center justify-between ${sender === p.id ? p.color + ' text-white scale-[1.02]' : 'bg-slate-800/60 hover:bg-slate-800 text-slate-300'}`}>
                                        <span>{p.name}</span>
                                        {sender === p.id && <span class="text-xs font-mono">✓ Selected</span>}
                                    </button>
                                ))}
                                <button onClick={() => setSender('bank')} class={`w-full p-3 rounded-lg font-medium text-left transition flex items-center justify-between ${sender === 'bank' ? 'bg-slate-600 text-white' : 'bg-slate-800/60 hover:bg-slate-800 text-slate-300'}`}>
                                    <span>🏦 The Bank</span>
                                    {sender === 'bank' && <span class="text-xs font-mono">✓ Selected</span>}
                                </button>
                            </div>
                        </div>

                        {/* 2. RECEIVER */}
                        <div class="space-y-3">
                            <label class="text-xs uppercase font-mono tracking-widest text-slate-400 block">2. Who gets paid? (To)</label>
                            <div class="flex flex-col gap-2">
                                {players.map(p => (
                                    <button key={p.id} onClick={() => setReceiver(p.id)} class={`w-full p-3 rounded-lg font-medium text-left transition flex items-center justify-between ${receiver === p.id ? p.color + ' text-white scale-[1.02]' : 'bg-slate-800/60 hover:bg-slate-800 text-slate-300'}`}>
                                        <span>{p.name}</span>
                                        {receiver === p.id && <span class="text-xs font-mono">✓ Selected</span>}
                                    </button>
                                ))}
                                <button onClick={() => setReceiver('bank')} class={`w-full p-3 rounded-lg font-medium text-left transition flex items-center justify-between ${receiver === 'bank' ? 'bg-slate-600 text-white' : 'bg-slate-800/60 hover:bg-slate-800 text-slate-300'}`}>
                                    <span>🏦 The Bank</span>
                                    {receiver === 'bank' && <span class="text-xs font-mono">✓ Selected</span>}
                                </button>
                            </div>
                        </div>

                        {/* 3. DENOMINATIONS & AMOUNT */}
                        <div class="space-y-4 flex flex-col justify-between">
                            <div class="space-y-3">
                                <label class="text-xs uppercase font-mono tracking-widest text-slate-400 block">3. Stack Amount</label>
                                <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                                    <div class="text-3xl font-mono font-bold text-emerald-400">${amount.toLocaleString()}</div>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onClick={() => setAmount(prev => prev + 50)} class="p-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-lg text-sm font-mono font-bold text-slate-200 border border-slate-700/50">+$50</button>
                                    <button onClick={() => setAmount(prev => prev + 100)} class="p-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-lg text-sm font-mono font-bold text-slate-200 border border-slate-700/50">+$100</button>
                                    <button onClick={() => setAmount(prev => prev + 500)} class="p-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-lg text-sm font-mono font-bold text-slate-200 border border-slate-700/50">+$500</button>
                                    <button onClick={() => setAmount(prev => prev + 1000)} class="p-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-lg text-sm font-mono font-bold text-slate-200 border border-slate-700/50">+$1,000</button>
                                </div>
                                <button onClick={() => setAmount(0)} class="w-full py-1.5 bg-slate-900 hover:bg-slate-800 text-xs text-slate-400 rounded border border-slate-800 font-mono">Clear Amount</button>
                            </div>

                            {/* REASON & SUBMIT */}
                            <div class="space-y-3 pt-4 border-t border-slate-800/60">
                                <div class="grid grid-cols-3 gap-1 text-center text-xs">
                                    {['General', 'Rent', 'Pass Start'].map(r => (
                                        <button key={r} onClick={() => { setReason(r); if(r==='Pass Start' && amount===0) setAmount(2000); }} class={`py-1 rounded font-mono ${reason === r ? 'bg-slate-700 text-white' : 'bg-slate-800/40 text-slate-400'}`}>{r}</button>
                                    ))}
                                </div>
                                <button onClick={handleExecute} class="w-full p-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-lg shadow-emerald-900/20 active:scale-[0.99] transition duration-100">
                                    EXECUTE TRANSACTION
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Ledger History & Undo */}
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xs uppercase font-mono tracking-widest text-slate-400">Transaction History Log</h2>
                            {logs.length > 0 && (
                                <button onClick={handleUndo} class="px-3 py-1 bg-amber-600/20 text-amber-400 hover:bg-amber-600/30 text-xs font-mono font-semibold rounded border border-amber-500/30 transition flex items-center gap-1">
                                    <span>↩</span> UNDO LAST TRANSACTION
                                </button>
                            )}
                        </div>

                        <div class="bg-slate-900/20 border border-slate-800 rounded-xl max-h-48 overflow-y-auto divide-y divide-slate-800/60">
                            {logs.length === 0 ? (
                                <div class="p-4 text-center text-sm text-slate-600 font-mono">No transactions recorded yet. Ready to play.</div>
                            ) : (
                                logs.map(log => (
                                    <div key={log.id} class="p-3 text-sm flex justify-between items-center hover:bg-slate-900/40">
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <span class="font-medium text-slate-300">{log.sender.name}</span>
                                            <span class="text-slate-500 text-xs">➡️</span>
                                            <span class="font-medium text-slate-300">{log.receiver.name}</span>
                                            <span class="text-slate-600">•</span>
                                            <span class="font-mono font-bold text-emerald-400">${log.amount.toLocaleString()}</span>
                                            <span class="text-xs bg-slate-800/80 px-1.5 py-0.5 text-slate-400 rounded font-mono font-light">{log.reason}</span>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
